<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<title>Recuperar senha | TattooMatch</title>
<link rel="stylesheet" href="/styles/theme.css">
<link rel="stylesheet" href="/styles/pages/recovery.css">
</head>
<body>
<div id="navbar"></div>

<main class="page-shell">
  <section class="card">
    <span class="eyebrow">Recuperação de conta</span>
    <h1>Esqueceu sua senha?</h1>
    <p>Informe o e-mail da sua conta para gerar um link de redefinição.</p>

    <form id="forgotForm" class="stack">
      <label for="email">E-mail</label>
      <input id="email" type="email" placeholder="seuemail@exemplo.com" required>
      <button type="submit">Enviar link de recuperação</button>
    </form>

    <p id="message" class="message"></p>
    <p id="previewWrap" class="message" hidden>Link de teste: <a id="previewLink" target="_blank" rel="noopener noreferrer">abrir redefinição</a></p>
    <p class="message"><a href="/login.html">Voltar para o login</a></p>
  </section>
</main>

<div id="footer"></div>

<script src="/scripts/frontend.js"></script>
<script>
const { fetchJson, loadFooter, loadNavbar } = window.FrontendUtils;

document.addEventListener("DOMContentLoaded", async () => {
  await loadNavbar();
  await loadFooter();
});

document.getElementById("forgotForm").addEventListener("submit", async (event) => {
  event.preventDefault();

  const email = document.getElementById("email").value.trim();
  const message = document.getElementById("message");
  const previewWrap = document.getElementById("previewWrap");
  const previewLink = document.getElementById("previewLink");

  message.textContent = "Gerando link de recuperação...";
  previewWrap.hidden = true;

  const result = await fetchJson("/forgot-password", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email }),
  });

  const data = result.data || {};
  message.textContent = data.mensagem || data.erro || "Não foi possível iniciar a recuperação.";

  if (data.preview_url) {
    previewLink.href = data.preview_url;
    previewLink.textContent = data.preview_url;
    previewWrap.hidden = false;
  }
});
</script>
</body>
</html>
