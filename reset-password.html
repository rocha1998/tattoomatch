<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir senha | TattooMatch</title>
<link rel="stylesheet" href="/styles/theme.css">
<link rel="stylesheet" href="/styles/pages/recovery.css">
</head>
<body>
<div id="navbar"></div>

<main class="page-shell">
  <section class="card">
    <span class="eyebrow">Nova senha</span>
    <h1>Redefinir acesso</h1>
    <p id="status">Validando seu link de recuperação...</p>

    <form id="resetForm" class="stack" hidden>
      <label for="senha">Nova senha</label>
      <input id="senha" type="password" placeholder="Mínimo de 6 caracteres" required>
      <button type="submit">Salvar nova senha</button>
    </form>

    <p class="message"><a href="/login.html">Voltar para login</a></p>
  </section>
</main>

<div id="footer"></div>

<script src="/scripts/frontend.js"></script>
<script>
const { fetchJson, loadFooter, loadNavbar } = window.FrontendUtils;
const token = new URLSearchParams(window.location.search).get("token") || "";

document.addEventListener("DOMContentLoaded", async () => {
  await loadNavbar();
  await loadFooter();
  await validarToken();
});

async function validarToken() {
  const status = document.getElementById("status");
  const form = document.getElementById("resetForm");

  if (!token) {
    status.textContent = "Token de recuperação ausente.";
    return;
  }

  const result = await fetchJson(`/reset-password/validate?token=${encodeURIComponent(token)}`);
  const data = result.data || {};

  if (!result.ok) {
    status.textContent = data.erro || "Link inválido ou expirado.";
    return;
  }

  status.textContent = "Token válido. Defina sua nova senha.";
  form.hidden = false;
}

document.getElementById("resetForm").addEventListener("submit", async (event) => {
  event.preventDefault();

  const senha = document.getElementById("senha").value;
  const status = document.getElementById("status");

  status.textContent = "Salvando nova senha...";

  const result = await fetchJson("/reset-password", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token, nova_senha: senha }),
  });

  const data = result.data || {};
  status.textContent = data.mensagem || data.erro || "Não foi possível redefinir a senha.";

  if (result.ok) {
    document.getElementById("resetForm").hidden = true;
  }
});
</script>
</body>
</html>
