<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<title>Redefinir senha | TattooMatch</title>
<link rel="stylesheet" href="/styles/theme.css">
<link rel="stylesheet" href="/styles/pages/recovery.css">
<script src="/scripts/google-ads-tag.js"></script>
</head>
<body>
<div id="navbar"></div>

<main class="page-shell">
  <section class="card">
    <span class="eyebrow">Nova senha</span>
    <h1>Redefinir acesso</h1>
    <p id="status">Validando seu link de recuperacao...</p>

    <form id="resetForm" class="stack" hidden>
      <label for="senha">Nova senha</label>
      <div class="password-field">
        <input id="senha" type="password" placeholder="Minimo de 8 caracteres" required>
        <button
          class="password-toggle"
          type="button"
          data-toggle-target="senha"
          aria-label="Mostrar senha"
          aria-pressed="false"
        >Mostrar</button>
      </div>

      <label for="confirmarSenha">Confirmar nova senha</label>
      <div class="password-field">
        <input id="confirmarSenha" type="password" placeholder="Confirme a nova senha" required>
        <button
          class="password-toggle"
          type="button"
          data-toggle-target="confirmarSenha"
          aria-label="Mostrar confirmacao de senha"
          aria-pressed="false"
        >Mostrar</button>
      </div>

      <button type="submit">Salvar nova senha</button>
    </form>

    <p class="message"><a href="/login.html">Voltar para o login</a></p>
  </section>
</main>

<div id="footer"></div>

<script src="/scripts/frontend.js"></script>
<script>
const { fetchJson, loadFooter, loadNavbar } = window.FrontendUtils;
const token = new URLSearchParams(window.location.search).get("token") || "";

document.addEventListener("DOMContentLoaded", async () => {
  await loadNavbar();
  await loadFooter();
  await validarToken();
});

document.querySelectorAll(".password-toggle").forEach((button) => {
  button.addEventListener("click", () => {
    const target = document.getElementById(button.dataset.toggleTarget);
    const shouldShow = target.type === "password";

    target.type = shouldShow ? "text" : "password";
    button.textContent = shouldShow ? "Ocultar" : "Mostrar";
    button.setAttribute("aria-label", shouldShow ? "Ocultar senha" : "Mostrar senha");
    button.setAttribute("aria-pressed", shouldShow ? "true" : "false");
  });
});

async function validarToken() {
  const status = document.getElementById("status");
  const form = document.getElementById("resetForm");

  if (!token) {
    status.textContent = "Token de recuperacao ausente.";
    return;
  }

  const result = await fetchJson(`/reset-password/validate?token=${encodeURIComponent(token)}`);
  const data = result.data || {};

  if (!result.ok) {
    status.textContent = data.erro || "Link invalido ou expirado.";
    return;
  }

  status.textContent = "Token valido. Defina sua nova senha.";
  form.hidden = false;
}

document.getElementById("resetForm").addEventListener("submit", async (event) => {
  event.preventDefault();

  const senha = document.getElementById("senha").value;
  const confirmarSenha = document.getElementById("confirmarSenha").value;
  const status = document.getElementById("status");

  if (senha.length < 8) {
    status.textContent = "Sua nova senha precisa ter no minimo 8 caracteres.";
    return;
  }

  if (senha !== confirmarSenha) {
    status.textContent = "A confirmacao de senha precisa ser igual a nova senha.";
    return;
  }

  status.textContent = "Salvando nova senha...";

  const result = await fetchJson("/reset-password", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token, nova_senha: senha }),
  });

  const data = result.data || {};
  status.textContent = data.mensagem || data.erro || "Nao foi possivel redefinir a senha.";

  if (result.ok) {
    document.getElementById("resetForm").hidden = true;
  }
});
</script>
</body>
</html>
