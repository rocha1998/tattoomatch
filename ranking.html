<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<title>__SEO_TITLE__</title>
<meta name="description" content="__SEO_DESCRIPTION__">
<meta name="robots" content="__SEO_ROBOTS__">
<link rel="canonical" href="__SEO_CANONICAL__">
<meta property="og:title" content="__SEO_OG_TITLE__">
<meta property="og:description" content="__SEO_OG_DESCRIPTION__">
<meta property="og:type" content="website">
<meta property="og:url" content="__SEO_CANONICAL__">
<meta property="og:image" content="__SEO_OG_IMAGE__">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="__SEO_TWITTER_TITLE__">
<meta name="twitter:description" content="__SEO_TWITTER_DESCRIPTION__">
<meta name="twitter:image" content="__SEO_TWITTER_IMAGE__">
<link rel="stylesheet" href="/styles/theme.css">
<link rel="stylesheet" href="/styles/pages/ranking.css">
<script type="application/ld+json">__SEO_JSON_LD__</script>
</head>

<body>
<div id="navbar"></div>

<main>
  <section class="hero">
    <h1>Ranking de tatuadores</h1>
    <p>
      Veja os artistas mais bem posicionados com base em avalia&ccedil;&otilde;es e prioridade
      de plano dentro da plataforma.
    </p>
  </section>

  <section class="list" id="ranking"></section>
  <div class="empty-state" id="emptyState" hidden>Nenhum artista apareceu no ranking ainda.</div>
</main>

<script src="/scripts/frontend.js"></script>
<script>
const { escapeHtml, fetchJson, loadNavbar } = window.FrontendUtils;

document.addEventListener("DOMContentLoaded", async () => {
  await loadNavbar();
  await carregarRanking();
});

async function carregarRanking() {
  const result = await fetchJson("/ranking");
  const div = document.getElementById("ranking");
  const empty = document.getElementById("emptyState");

  div.innerHTML = "";

  if (!result.ok || !Array.isArray(result.data)) {
    empty.hidden = false;
    empty.textContent = result.error || "N\u00e3o foi poss\u00edvel carregar o ranking agora.";
    return;
  }

  const tatuadores = result.data;

  if (!tatuadores.length) {
    empty.hidden = false;
    return;
  }

  empty.hidden = true;

  tatuadores.forEach((t, index) => {
    const card = document.createElement("article");
    card.className = "card";
    card.innerHTML = `
      <div class="position">#${index + 1}</div>
      <div class="info">
        <h2>${escapeHtml(t.nome_artistico || "Artista sem nome")}</h2>
        <p>${escapeHtml(t.cidade || "Cidade n\u00e3o informada")} &bull; ${escapeHtml(t.plano || "Sem plano")}</p>
        <p>${Number(t.total_avaliacoes || 0)} avalia\u00e7\u00e3o(\u00f5es) registrada(s)</p>
      </div>
      <div class="score">
        <strong>${Number(t.media || 0).toFixed(1)}</strong>
        <span>M\u00e9dia geral</span>
      </div>
    `;

    div.appendChild(card);
  });
}
</script>
</body>
</html>
