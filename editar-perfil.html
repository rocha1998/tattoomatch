<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<title>Editar Perfil Profissional | TattooMatch</title>
<link rel="stylesheet" href="/styles/theme.css">
<link rel="stylesheet" href="/styles/pages/editar-perfil.css">
</head>

<body>
<div id="navbar"></div>

<main>
  <section class="hero">
    <h1>Editar perfil profissional</h1>
    <p>
      Atualize as informa&ccedil;&otilde;es que ajudam clientes a encontrar voc&ecirc;: nome art&iacute;stico,
      bio, localiza&ccedil;&atilde;o, estilos, contato e foto de perfil.
    </p>
  </section>

  <section class="form-card">
    <div class="form-grid">
      <div class="field">
        <label for="nome">Nome art&iacute;stico</label>
        <input id="nome" placeholder="Seu nome art&iacute;stico">
      </div>

      <div class="field">
        <label for="whatsapp">WhatsApp</label>
        <input id="whatsapp" placeholder="Ex: 31999999999">
      </div>

      <div class="field">
        <label for="estado">Estado</label>
        <input id="estado" placeholder="Ex: MG">
      </div>

      <div class="field">
        <label for="cidade">Cidade</label>
        <input id="cidade" placeholder="Sua cidade">
      </div>

      <div class="field">
        <label for="bairro">Bairro</label>
        <input id="bairro" placeholder="Ex: Savassi">
      </div>

      <div class="field">
        <label for="municipio">Regi&atilde;o de atendimento</label>
        <input id="municipio" placeholder="Ex: Pampulha, Centro-Sul ou Belo Horizonte">
      </div>

      <div class="field">
        <label for="logradouro">Rua / avenida</label>
        <input id="logradouro" placeholder="Uso interno para localiza&ccedil;&atilde;o">
      </div>

      <div class="field">
        <label for="numero">N&uacute;mero</label>
        <input id="numero" placeholder="N&uacute;mero">
      </div>

      <div class="field">
        <label for="complemento">Complemento</label>
        <input id="complemento" placeholder="Sala, bloco, refer&ecirc;ncia">
      </div>

      <div class="field">
        <label for="cep">CEP</label>
        <input id="cep" placeholder="00000-000">
      </div>

      <div class="field">
        <label for="estilos">Estilos</label>
        <input id="estilos" placeholder="Ex: Realismo, Blackwork">
      </div>

      <div class="field">
        <label for="disponivel">Dispon&iacute;vel para novos projetos</label>
        <select id="disponivel">
          <option value="true">Sim</option>
          <option value="false">N&atilde;o</option>
        </select>
      </div>

      <div class="field-full">
        <label for="bio">Bio</label>
        <textarea id="bio" placeholder="Conte quem voc&ecirc; &eacute;, sua experi&ecirc;ncia e o tipo de trabalho que faz."></textarea>
      </div>

      <div class="field-full">
        <label for="foto">Foto de perfil</label>
        <input type="file" id="foto" accept="image/*">
      </div>
    </div>

    <div class="actions">
      <button onclick="salvar()">Salvar perfil</button>
      <a class="link-button" href="/home.html">Voltar para minha conta</a>
    </div>

    <p id="status">Carregando dados do seu perfil...</p>
  </section>
</main>

<div id="footer"></div>

<script src="/scripts/frontend.js"></script>
<script>
const { fetchAuthJson, loadFooter, loadNavbar, logout, requireAuth } = window.FrontendUtils;
const localizacaoTecnica = {
  latitude: "",
  longitude: "",
};

document.addEventListener("DOMContentLoaded", async () => {
  await loadNavbar();
  await loadFooter();
  await carregarPerfil();
});

function atualizarStatus(message) {
  document.getElementById("status").textContent = message;
}

async function carregarPerfil() {
  const auth = requireAuth();
  if (!auth) {
    return;
  }

  const result = await fetchAuthJson("/perfil-profissional");

  if (result.status === 401) {
    logout();
    return;
  }

  const data = result.data || {};

  if (!result.ok) {
    atualizarStatus(data.erro || "N\u00e3o foi poss\u00edvel carregar seu perfil.");
    return;
  }

  document.getElementById("nome").value = data.nome_artistico || "";
  document.getElementById("bio").value = data.bio || "";
  document.getElementById("estado").value = data.estado || "";
  document.getElementById("cidade").value = data.cidade || "";
  document.getElementById("bairro").value = data.bairro || "";
  document.getElementById("municipio").value = data.municipio || "";
  document.getElementById("logradouro").value = data.logradouro || "";
  document.getElementById("numero").value = data.numero || "";
  document.getElementById("complemento").value = data.complemento || "";
  document.getElementById("cep").value = data.cep || "";
  document.getElementById("estilos").value = data.estilos || "";
  document.getElementById("whatsapp").value = data.whatsapp || "";
  document.getElementById("disponivel").value = data.disponivel === false ? "false" : "true";
  localizacaoTecnica.latitude = data.latitude ?? "";
  localizacaoTecnica.longitude = data.longitude ?? "";

  atualizarStatus("Atualize os campos que quiser e salve as mudan\u00e7as.");
}

async function salvar() {
  const auth = requireAuth();
  if (!auth) {
    return;
  }

  atualizarStatus("Salvando perfil...");

  const formData = new FormData();
  formData.append("nome_artistico", document.getElementById("nome").value);
  formData.append("bio", document.getElementById("bio").value);
  formData.append("estado", document.getElementById("estado").value);
  formData.append("cidade", document.getElementById("cidade").value);
  formData.append("bairro", document.getElementById("bairro").value);
  formData.append("municipio", document.getElementById("municipio").value);
  formData.append("logradouro", document.getElementById("logradouro").value);
  formData.append("numero", document.getElementById("numero").value);
  formData.append("complemento", document.getElementById("complemento").value);
  formData.append("cep", document.getElementById("cep").value);
  formData.append("estilos", document.getElementById("estilos").value);
  formData.append("whatsapp", document.getElementById("whatsapp").value);
  formData.append("disponivel", document.getElementById("disponivel").value);
  formData.append("latitude", localizacaoTecnica.latitude);
  formData.append("longitude", localizacaoTecnica.longitude);

  const foto = document.getElementById("foto").files[0];
  if (foto) {
    formData.append("foto_perfil", foto);
  }

  const result = await fetchAuthJson("/perfil-profissional", {
    method: "PUT",
    body: formData,
  });

  if (result.status === 401) {
    logout();
    return;
  }

  const data = result.data || {};
  atualizarStatus(data.mensagem || data.erro || "N\u00e3o foi poss\u00edvel salvar o perfil.");
}
</script>
</body>
</html>
